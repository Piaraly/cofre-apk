name: Gerar APK da Cofre

# Corre automaticamente quando se carregam ficheiros, e tambem
# pode ser iniciado a mao no separador "Actions".
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Obter os ficheiros
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Preparar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes do SDK
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" >/dev/null 2>&1 || true

      - name: Gerar o gradlew (wrapper)
        run: gradle wrapper --gradle-version 8.9

      - name: Compilar o APK (debug)
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Publicar o APK para descarregar
        uses: actions/upload-artifact@v4
        with:
          name: Cofre-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
