<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<meta name="description" content="Cofre - Gestão financeira pessoal e de negócios">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Cofre — Gestão Financeira</title>
<style>
/* =========================================================
   COFRE — Folha de estilos
   ========================================================= */
:root{
  --accent:#0f766e; --accent-2:#10b981; --accent-soft:#0f766e22;
  --indigo:#6366f1; --gold:#d4a017; --red:#e11d48; --green:#16a34a;
  --amber:#d97706; --blue:#2563eb;
  --radius:16px; --radius-sm:10px; --shadow:0 6px 24px rgba(2,6,23,.10);
  --shadow-lg:0 18px 50px rgba(2,6,23,.18);
  --maxw:1180px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
[data-theme="light"]{
  --bg:#eef2f6; --bg-2:#e3e9f0; --surface:#ffffff; --surface-2:#f7f9fc;
  --text:#0f172a; --muted:#5b6b7f; --line:#e2e8f0; --line-2:#eef2f6;
  --nav:#0c1b2a; --nav-text:#cdd9e5; --nav-active:#10b981;
  --input:#ffffff; --chip:#eef2f7;
}
[data-theme="dark"]{
  --bg:#0b1220; --bg-2:#0f1830; --surface:#141d33; --surface-2:#1b2748;
  --text:#e6ecf5; --muted:#9fb0c6; --line:#243150; --line-2:#1c2742;
  --nav:#0a1120; --nav-text:#aebfd6; --nav-active:#10b981;
  --input:#0f1830; --chip:#1d2944;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased; line-height:1.5;
  overflow-x:hidden;
}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:20px}

/* ---------- Layout ---------- */
.app{display:flex;min-height:100vh}
.sidebar{
  width:248px;flex:0 0 248px;background:var(--nav);color:var(--nav-text);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:60;
  transition:transform .25s ease;
}
.brand{display:flex;align-items:center;gap:12px;padding:20px 18px 16px}
.brand .logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;box-shadow:0 6px 16px rgba(16,185,129,.35)}
.brand .logo svg{width:24px;height:24px}
.brand h1{font-size:1.15rem;font-weight:800;letter-spacing:.3px;color:#fff}
.brand small{display:block;font-size:.66rem;color:var(--nav-text);opacity:.75;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.nav{flex:1;overflow-y:auto;padding:8px 12px 16px}
.nav-group-label{font-size:.66rem;text-transform:uppercase;letter-spacing:1.4px;color:var(--nav-text);opacity:.5;margin:14px 10px 6px;font-weight:700}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;
  color:var(--nav-text);font-weight:600;font-size:.92rem;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;
  transition:background .15s,color .15s;
}
.nav-item svg{width:20px;height:20px;flex:0 0 20px;opacity:.85}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:linear-gradient(90deg,var(--accent-soft),transparent);color:#fff}
.nav-item.active{box-shadow:inset 3px 0 0 var(--nav-active)}
.nav-item.active svg{opacity:1;color:var(--accent-2)}
.sidebar-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:.72rem;color:var(--nav-text);opacity:.7}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:40;background:var(--bg);
  display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line-2);
  backdrop-filter:blur(6px);
}
.topbar h2{font-size:1.3rem;font-weight:800;flex:1;min-width:0}
.topbar .sub{font-size:.78rem;color:var(--muted);font-weight:500}
.hamburger{display:none;background:var(--surface);border:1px solid var(--line);border-radius:10px;width:42px;height:42px;place-items:center;color:var(--text)}
.hamburger svg{width:22px;height:22px}
.icon-btn{background:var(--surface);border:1px solid var(--line);border-radius:10px;height:42px;min-width:42px;padding:0 12px;display:inline-flex;align-items:center;gap:8px;color:var(--text);font-weight:600;font-size:.85rem}
.icon-btn svg{width:18px;height:18px}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.view{padding:22px;max-width:var(--maxw);width:100%;margin:0 auto;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Cards / grid ---------- */
.grid{display:grid;gap:16px}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.card.pad-lg{padding:22px}
.card-h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.card-h h3{font-size:1.02rem;font-weight:700;flex:1}
.card-h .ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent)}
.card-h .ico svg{width:19px;height:19px}

.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .label{font-size:.78rem;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:8px}
.kpi .label .dot{width:30px;height:30px;border-radius:9px;display:grid;place-items:center}
.kpi .label .dot svg{width:17px;height:17px}
.kpi .val{font-size:1.7rem;font-weight:800;margin-top:10px;letter-spacing:-.5px;line-height:1.1}
.kpi .delta{font-size:.76rem;font-weight:600;margin-top:6px;color:var(--muted)}
.kpi .delta.up{color:var(--green)} .kpi .delta.down{color:var(--red)}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--line);background:var(--surface);
  color:var(--text);border-radius:11px;padding:10px 16px;font-weight:700;font-size:.88rem;transition:.15s}
.btn svg{width:17px;height:17px}
.btn:hover{border-color:var(--accent)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;box-shadow:0 6px 16px rgba(16,185,129,.3)}
.btn-primary:hover{filter:brightness(1.06)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--chip);color:var(--text)}
.btn-danger{background:var(--red);color:#fff;border:none}
.btn-sm{padding:7px 11px;font-size:.8rem;border-radius:9px}
.btn-block{width:100%}
.fab{position:fixed;right:20px;bottom:84px;z-index:45;width:56px;height:56px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:var(--shadow-lg);display:none;place-items:center}
.fab svg{width:26px;height:26px}

/* ---------- Tables ---------- */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;font-size:.88rem;min-width:480px}
th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;padding:11px 14px;background:var(--surface-2);border-bottom:1px solid var(--line)}
td{padding:11px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface-2)}
.t-right{text-align:right} .t-center{text-align:center}
.num{font-variant-numeric:tabular-nums;font-weight:600}

/* ---------- Badges / chips ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:700}
.badge.green{background:#16a34a22;color:#16a34a} .badge.red{background:#e11d4822;color:#e11d48}
.badge.amber{background:#d9770622;color:#d97706} .badge.blue{background:#2563eb22;color:#2563eb}
.badge.gray{background:var(--chip);color:var(--muted)} .badge.indigo{background:#6366f122;color:#6366f1}
.chip{padding:6px 12px;border-radius:20px;background:var(--chip);color:var(--text);font-size:.82rem;font-weight:600;border:1px solid transparent;cursor:pointer}
.chip.active{background:var(--accent);color:#fff}
.chips{display:flex;gap:8px;flex-wrap:wrap}

/* ---------- Progress ---------- */
.bar{height:9px;border-radius:20px;background:var(--line-2);overflow:hidden}
.bar > i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.bar.red > i{background:linear-gradient(90deg,#f43f5e,#e11d48)}
.bar.amber > i{background:linear-gradient(90deg,#f59e0b,#d97706)}

/* ---------- Forms ---------- */
.field{margin-bottom:13px}
.field label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;background:var(--input);border:1px solid var(--line);border-radius:10px;
  padding:11px 13px;color:var(--text);font-size:.92rem;font-family:inherit;transition:.15s
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field textarea{resize:vertical;min-height:64px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.hint{font-size:.74rem;color:var(--muted);margin-top:5px}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(2,6,23,.55);backdrop-filter:blur(3px);z-index:90;display:none;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:520px;margin:auto;animation:pop .2s ease}
.modal.wide{max-width:760px}
@keyframes pop{from{opacity:0;transform:scale(.97) translateY(10px)}to{opacity:1;transform:none}}
.modal-h{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--line)}
.modal-h h3{font-size:1.1rem;font-weight:800;flex:1}
.modal-b{padding:20px}
.modal-f{display:flex;gap:10px;justify-content:flex-end;padding:16px 20px;border-top:1px solid var(--line)}
.x{background:var(--chip);border:none;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--text)}

/* ---------- Toast ---------- */
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:120;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--nav);color:#fff;padding:12px 18px;border-radius:12px;font-weight:600;font-size:.88rem;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;animation:pop .2s}
.toast.ok{background:#15803d}.toast.err{background:#be123c}.toast svg{width:18px;height:18px}

/* ---------- Misc ---------- */
.section-title{display:flex;align-items:center;gap:10px;margin:6px 0 14px}
.section-title h3{font-size:1.05rem;font-weight:800}
.section-title .sp{flex:1}
.empty{text-align:center;padding:34px 18px;color:var(--muted)}
.empty svg{width:46px;height:46px;opacity:.4;margin-bottom:10px}
.empty p{font-size:.9rem}
.muted{color:var(--muted)} .small{font-size:.8rem} .b{font-weight:700} .mt{margin-top:14px} .mb{margin-bottom:14px}
.pos{color:var(--green)} .neg{color:var(--red)}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.flex{display:flex;align-items:center;gap:10px} .wrap{flex-wrap:wrap}
.tabs{display:flex;gap:6px;background:var(--surface-2);padding:5px;border-radius:12px;margin-bottom:16px;overflow-x:auto;border:1px solid var(--line)}
.tab{padding:9px 15px;border-radius:9px;border:none;background:none;color:var(--muted);font-weight:700;font-size:.85rem;white-space:nowrap}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.list-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line-2)}
.list-row:last-child{border:none}
.av{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-weight:800;font-size:.9rem;flex:0 0 38px}
.spark{display:flex;align-items:flex-end;gap:3px;height:42px}
.spark > i{flex:1;background:var(--accent-soft);border-radius:3px 3px 0 0;min-height:3px}
.divider{height:1px;background:var(--line);margin:16px 0}
.pill-toggle{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px}
.pill-toggle button{border:none;background:none;padding:7px 13px;border-radius:8px;font-weight:700;font-size:.82rem;color:var(--muted)}
.pill-toggle button.active{background:var(--accent);color:#fff}

/* ---------- Responsive ---------- */
@media(max-width:980px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:1fr 1fr}}
@media(max-width:760px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:none}
  .hamburger{display:grid}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55;display:none}
  .scrim.show{display:block}
  .cols-2,.cols-3,.cols-4{grid-template-columns:1fr}
  .f-row,.f-row-3{grid-template-columns:1fr}
  .view{padding:16px 14px 96px}
  .topbar{padding:12px 14px}
  .topbar h2{font-size:1.1rem}
  .fab{display:grid}
  .kpi .val{font-size:1.45rem}
}
@media(min-width:761px){.hide-desk{display:none}}
.hidden{display:none!important}

/* ---------- Gráficos ---------- */
.flowchart{display:flex;align-items:flex-end;gap:8px;height:180px;padding-top:8px}
.fc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;min-width:0}
.fc-bars{flex:1;display:flex;align-items:flex-end;gap:4px;width:100%;justify-content:center}
.fc-bar{width:13px;border-radius:5px 5px 0 0;min-height:3px;transition:height .5s ease;cursor:default}
.fc-bar.in{background:linear-gradient(180deg,var(--accent-2),var(--accent))}
.fc-bar.out{background:linear-gradient(180deg,#fb7185,#e11d48)}
.fc-label{font-size:.72rem;color:var(--muted);font-weight:600}
.legend{display:flex;flex-direction:column;gap:9px}
.legend .li{display:flex;align-items:center;gap:9px;font-size:.85rem}
.legend .sw{width:12px;height:12px;border-radius:4px;flex:0 0 12px}
.legend .nm{flex:1;color:var(--text);font-weight:600}
.legend .vv{font-weight:700;font-variant-numeric:tabular-nums}
.legend .pc{color:var(--muted);font-size:.76rem;min-width:38px;text-align:right}
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center}
.chart-x{display:flex;justify-content:space-between;margin-top:6px}
.chart-x span{font-size:.7rem;color:var(--muted);font-weight:600}

/* ---------- Calculadora ---------- */
.calc{max-width:320px;margin:0 auto}
.calc-screen{background:var(--nav);color:#fff;border-radius:14px;padding:18px;text-align:right;margin-bottom:12px}
.calc-screen .prev{font-size:.85rem;color:#9fb0c6;min-height:18px;word-break:break-all}
.calc-screen .cur{font-size:2rem;font-weight:800;word-break:break-all}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.calc-grid button{border:none;border-radius:12px;padding:16px 0;font-size:1.15rem;font-weight:700;background:var(--surface-2);color:var(--text);border:1px solid var(--line)}
.calc-grid button:active{transform:scale(.96)}
.calc-grid button.op{background:var(--accent-soft);color:var(--accent)}
.calc-grid button.eq{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none}
.calc-grid button.fn{background:var(--chip);color:var(--muted);font-size:.95rem}
.tool-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.tool-card h4{font-size:.95rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.tool-card .res{margin-top:12px;padding:12px;border-radius:10px;background:var(--accent-soft);color:var(--accent);font-weight:800;font-size:1.05rem;text-align:center}
.stat-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line-2);font-size:.9rem}
.stat-line:last-child{border:none}
.stat-line b{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="12" cy="12" r="3.2"/><path d="M12 8.8v.4M12 14.8v.4M15.2 12h-.4M9.2 12h-.4"/></svg>
      </div>
      <div><h1 id="brandName">Cofre</h1><small>Gestão Financeira</small></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">Os seus dados ficam guardados <b>apenas neste dispositivo</b>.</div>
  </aside>
  <div class="scrim" id="scrim" onclick="toggleNav(false)"></div>

  <main class="main">
    <header class="topbar">
      <button class="hamburger" onclick="toggleNav(true)" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div style="flex:1;min-width:0">
        <h2 id="pageTitle">Painel</h2>
      </div>
      <button class="icon-btn hidden" onclick="installApp()" id="installBtn" title="Instalar app" style="border-color:var(--accent);color:var(--accent)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        <span class="hide-desk-no">Instalar</span>
      </button>
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Mudar tema">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>
      </button>
      <button class="icon-btn hide-desk-no" onclick="navigate('definicoes')" title="Definições">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>
    <div class="view" id="view"></div>
  </main>
</div>

<button class="fab" id="fab" onclick="fabAction()" title="Adicionar">
  <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="overlay" id="overlay"></div>
<div class="toasts" id="toasts"></div>

<script>
/* =========================================================
   COFRE — Aplicação (JavaScript puro, sem internet)
   ========================================================= */
"use strict";

/* ---------- Estado por defeito ---------- */
const STORE_KEY = "cofre_state_v1";
function defaultState(){
  return {
    settings:{
      appName:"Cofre", theme:"dark",

let state = load();
function load(){
  try{ const raw=localStorage.getItem(STORE_KEY); if(raw){ return Object.assign(defaultState(), JSON.parse(raw)); } }
  catch(e){ console.warn(e); }
  return defaultState();
}
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){ toast("Erro ao guardar","err"); } }

/* ---------- Utilitários ---------- */
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const $ = (s,r=document)=> r.querySelector(s);
const $$ = (s,r=document)=> [...r.querySelectorAll(s)];
const todayISO = ()=> new Date().toISOString().slice(0,10);
function num(v){ const n=parseFloat(String(v).replace(/\s/g,"").replace(",",".")); return isNaN(n)?0:n; }
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }

function money(v, withCode=false){
  const c=state.settings.curr; const neg=v<0; v=Math.abs(+v||0);
  let s=v.toFixed(c.dec);
  let [ip,dp]=s.split(".");
  ip=ip.replace(/\B(?=(\d{3})+(?!\d))/g, c.ts);
  let out=ip+(c.dec>0?c.ds+dp:"");
  const sym = withCode? c.code : c.symbol;
  out = c.pos==="before" ? sym+" "+out : out+" "+sym;
  return (neg?"-":"")+out;
}
function moneyShort(v){
  const a=Math.abs(v);
  if(a>=1e6) return (v/1e6).toFixed(1).replace(".",state.settings.curr.ds)+"M";
  if(a>=1e3) return (v/1e3).toFixed(1).replace(".",state.settings.curr.ds)+"k";
  return Math.round(v).toString();
}
function fmtDate(iso){ if(!iso) return "—"; const d=new Date(iso+(iso.length<=10?"T00:00:00":""));
  return d.toLocaleDateString("pt-PT",{day:"2-digit",month:"short",year:"numeric"}); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function monthKey(iso){ return iso.slice(0,7); }
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function initials(name){ return (name||"?").trim().split(/\s+/).slice(0,2).map(w=>w[0]).join("").toUpperCase(); }
function colorFor(str){ const colors=["#0f766e","#6366f1","#d97706","#2563eb","#db2777","#16a34a","#9333ea","#0891b2"];
  let h=0; for(const ch of (str||"x")) h=(h*31+ch.charCodeAt(0))>>>0; return colors[h%colors.length]; }

/* ---------- Cálculos derivados ---------- */
function balance(){ return state.movements.reduce((s,m)=> s + (m.type==="in"? +m.amount : -+m.amount), 0); }
function balanceByAccount(){ const map={}; state.accounts.forEach(a=>map[a]=0);
  state.movements.forEach(m=>{ map[m.account]=(map[m.account]||0)+(m.type==="in"?+m.amount:-+m.amount); }); return map; }
function totalDebtsIOwe(){ return state.debts.filter(d=>d.dir==="i").reduce((s,d)=>s+(+d.amount-+(d.paid||0)),0); }
function totalDebtsOwedToMe(){ return state.debts.filter(d=>d.dir==="them").reduce((s,d)=>s+(+d.amount-+(d.paid||0)),0); }
function bizRevenue(){ return state.biz.sales.reduce((s,x)=>s+(+x.price*+x.qty),0); }
function bizCOGS(){ return state.biz.sales.reduce((s,x)=>s+(+(x.cost||0)*+x.qty),0); }
function bizExpenses(){ return state.biz.expenses.reduce((s,x)=>s+ +x.amount,0); }
function bizProfit(){ return bizRevenue()-bizCOGS()-bizExpenses(); }
function bizClientsOwe(){ return state.biz.debts.filter(d=>d.dir==="client").reduce((s,d)=>s+(+d.amount-+(d.paid||0)),0); }
function bizIOwe(){ return state.biz.debts.filter(d=>d.dir==="i").reduce((s,d)=>s+(+d.amount-+(d.paid||0)),0); }
function stockValue(){ return state.biz.products.reduce((s,p)=>s+ +p.stock*+p.cost,0); }
function assetsTotal(){ return state.assets.filter(a=>a.kind==="asset").reduce((s,a)=>s+ +a.value,0); }
function liabTotal(){ return state.assets.filter(a=>a.kind==="liab").reduce((s,a)=>s+ +a.value,0); }
function netWorth(){ return balance()+assetsTotal()+totalDebtsOwedToMe()+stockValue()+bizClientsOwe() - liabTotal() - totalDebtsIOwe() - bizIOwe(); }
function monthlySalaries(){ return state.salaries.filter(s=>s.active!==false).reduce((s,x)=>s+ +x.amount,0); }

/* movimentos por mês: {label, in, out} ult. n meses */
function monthlyFlow(n=6){
  const out=[]; const now=new Date();
  for(let i=n-1;i>=0;i--){
    const d=new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key=d.toISOString().slice(0,7);
    const ms=state.movements.filter(m=>m.date.slice(0,7)===key);
    out.push({
      key, label:d.toLocaleDateString("pt-PT",{month:"short"}),
      in:ms.filter(m=>m.type==="in").reduce((s,m)=>s+ +m.amount,0),
      out:ms.filter(m=>m.type==="out").reduce((s,m)=>s+ +m.amount,0)
    });
  }
  return out;
}
function expenseByCategory(){
  const map={};
  state.movements.filter(m=>m.type==="out").forEach(m=>{ map[m.category||"Outro"]=(map[m.category||"Outro"]||0)+ +m.amount; });
  return Object.entries(map).map(([k,v])=>({k,v})).sort((a,b)=>b.v-a.v);
}

/* ---------- Componentes de gráfico ---------- */
function donut(data, opts={}){
  const size=opts.size||172, r=size/2, ir=r*0.62, cx=r, cy=r;
  const nz=data.filter(d=>d.v>0);
  const total=nz.reduce((s,d)=>s+d.v,0);
  let paths="";
  if(total<=0){
    paths=`<circle cx="${cx}" cy="${cy}" r="${(r+ir)/2}" fill="none" stroke="var(--line)" stroke-width="${r-ir}"/>`;
  } else if(nz.length===1){
    paths=`<circle cx="${cx}" cy="${cy}" r="${(r+ir)/2}" fill="none" stroke="${nz[0].color}" stroke-width="${r-ir}"/>`;
  } else {
    let a=-Math.PI/2;
    nz.forEach(d=>{ const frac=d.v/total, a2=a+frac*2*Math.PI, large=frac>0.5?1:0;
      const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
      const xi1=cx+ir*Math.cos(a2),yi1=cy+ir*Math.sin(a2),xi2=cx+ir*Math.cos(a),yi2=cy+ir*Math.sin(a);
      paths+=`<path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} L${xi1} ${yi1} A${ir} ${ir} 0 ${large} 0 ${xi2} ${yi2} Z" fill="${d.color}"/>`;
      a=a2; });
  }
  const c=opts.center;
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="max-width:100%">${paths}
    ${c?`<text x="${cx}" y="${cy-1}" text-anchor="middle" font-size="15" font-weight="800" fill="var(--text)">${c.t||""}</text>
        <text x="${cx}" y="${cy+15}" text-anchor="middle" font-size="9.5" fill="var(--muted)">${c.s||""}</text>`:""}</svg>`;
}
function legend(data, total){
  total=total||data.reduce((s,d)=>s+d.v,0)||1;
  return `<div class="legend">${data.map(d=>`<div class="li">
    <span class="sw" style="background:${d.color}"></span>
    <span class="nm">${escapeHtml(d.k)}</span>
    <span class="vv">${money(d.v)}</span>
    <span class="pc">${Math.round(d.v/total*100)}%</span></div>`).join("")}</div>`;
}
function chartFlow(flow){
  const max=Math.max(1,...flow.map(f=>Math.max(f.in,f.out)));
  return `<div class="flowchart">${flow.map(f=>`<div class="fc-col">
    <div class="fc-bars">
      <div class="fc-bar in" style="height:${f.in/max*100}%" title="${f.label}: entradas ${money(f.in)}"></div>
      <div class="fc-bar out" style="height:${f.out/max*100}%" title="${f.label}: saídas ${money(f.out)}"></div>
    </div><div class="fc-label">${f.label}</div></div>`).join("")}</div>`;
}
function lineChart(points){
  const W=320,H=120,pad=8;
  if(!points.length) return "";
  const vs=points.map(p=>p.v); const min=Math.min(0,...vs), max=Math.max(1,...vs);
  const sx=i=> pad + i*(W-2*pad)/Math.max(1,points.length-1);
  const sy=v=> H-pad-(v-min)/((max-min)||1)*(H-2*pad);
  const line=points.map((p,i)=>(i?"L":"M")+sx(i).toFixed(1)+" "+sy(p.v).toFixed(1)).join(" ");
  const area=`M${sx(0)} ${H-pad} `+points.map((p,i)=>`L${sx(i).toFixed(1)} ${sy(p.v).toFixed(1)}`).join(" ")+` L${sx(points.length-1)} ${H-pad} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    <defs><linearGradient id="lg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="var(--accent-2)" stop-opacity=".35"/><stop offset="1" stop-color="var(--accent-2)" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#lg)"/>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    ${points.map((p,i)=>`<circle cx="${sx(i).toFixed(1)}" cy="${sy(p.v).toFixed(1)}" r="2.6" fill="var(--accent)"/>`).join("")}
  </svg><div class="chart-x">${points.map(p=>`<span>${p.label}</span>`).join("")}</div>`;
}

}

RENDERERS.painel=function(){
  const bal=balance(), iOwe=totalDebtsIOwe(), owed=totalDebtsOwedToMe();
  const emFund=state.emergency.current||0, emTarget=state.emergency.target||0;

function buildAlerts(){
  const a=[]; const today=todayISO();
  state.debts.filter(d=>d.dir==="i" && d.due && (+d.amount-+(d.paid||0))>0).forEach(d=>{
    const dd=daysBetween(today,d.due);
    if(dd<0) a.push({t:"red",tag:"Atrasado",msg:`Deve ${money(d.amount-(d.paid||0))} a ${escapeHtml(d.person)} (venceu ${fmtDate(d.due)})`});
    else if(dd<=3) a.push({t:"amber",tag:"A vencer",msg:`Pagar ${money(d.amount-(d.paid||0))} a ${escapeHtml(d.person)} em ${dd} dia(s)`});
  });
  state.biz.products.filter(p=>+p.stock<=+(p.min||0) && +(p.min||0)>0).forEach(p=>{
    a.push({t:"amber",tag:"Stock baixo",msg:`${escapeHtml(p.name)} com apenas ${p.stock} ${p.unit||"un"} em stock`});
  });
  if(balance()<0) a.push({t:"red",tag:"Saldo",msg:"O seu saldo está negativo."});
  return a.slice(0,6);
}

function averageMonthlyExpense(){
  const f=monthlyFlow(3); const vals=f.map(x=>x.out).filter(v=>v>0);
  if(!vals.length) return 0; return vals.reduce((a,b)=>a+b,0)/vals.length;
}
function estProject(){ const m=valN("pjM"),i=valN("pjI"),e=valN("pjE"); const r=balance()+(i-e)*m;
  $("#pjRes").innerHTML=`Terá cerca de <b>${money(r)}</b><br><span class="small" style="font-weight:600">(${money(i-e)}/mês × ${m} meses)</span>`; }
function estSpend(){ const x=valN("spX"); const r=balance()-x;
  $("#spRes").innerHTML= r>=0? `Ficaria com <b>${money(r)}</b>` : `<span style="color:#fff">⚠ Faltariam <b>${money(-r)}</b> — saldo insuficiente</span>`;
  $("#spRes").style.background = r>=0?"var(--accent-soft)":"#e11d48"; $("#spRes").style.color = r>=0?"var(--accent)":"#fff"; }
function estTime(){ const X=valN("tmX"),s=valN("tmS"),y=valN("tmY"); const falta=X-s;
  if(falta<=0){ $("#tmRes").innerHTML="Já atingiu a meta! 🎉"; return; }
  if(y<=0){ $("#tmRes").innerHTML="Indique quanto poupa por mês."; return; }
  const meses=Math.ceil(falta/y); const d=new Date(); d.setMonth(d.getMonth()+meses);
  $("#tmRes").innerHTML=`<b>${meses} meses</b> (≈ ${d.toLocaleDateString("pt-PT",{month:"long",year:"numeric"})})`; }
function estSave(){ const X=valN("svX"),s=valN("svS"),m=valN("svM"); const falta=X-s;
  if(falta<=0){ $("#svRes").innerHTML="Já atingiu a meta! 🎉"; return; }
  if(m<=0){ $("#svRes").innerHTML="Indique o prazo em meses."; return; }
  $("#svRes").innerHTML=`Poupe <b>${money(falta/m)}</b> por mês`; }
AFTER.saldo=function(){ if(saldoTab==="est"){ estProject(); estSpend(); estTime(); estSave(); } };

function payDebt(id){ const d=state.debts.find(x=>x.id===id); if(!d) return; const rest=d.amount-(d.paid||0);

function openEmergency(){ const e=state.emergency;

function emergencyMove(sign){ openModal(sign>0?"Adicionar ao fundo":"Retirar do fundo",
  `<div class="field"><label>Valor</label><input id="emMv" inputmode="decimal" value=""></div>`,
  {okText:"Confirmar",onOk:()=>{ const v=valN("emMv"); if(v<=0) return false; state.emergency.current=Math.max(0,(state.emergency.current||0)+v*sign); save(); refresh(); toast("Atualizado","ok"); }}); }

let bizTab="resumo";
function setBizTab(t){ bizTab=t; refresh(); }
function bizMonthlyRevenue(n=6){ const out=[]; const now=new Date();
  for(let i=n-1;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1),key=d.toISOString().slice(0,7);
    out.push({label:d.toLocaleDateString("pt-PT",{month:"short"}),
      v:state.biz.sales.filter(s=>s.date.slice(0,7)===key).reduce((a,s)=>a+ +s.price*+s.qty,0)}); } return out; }
function topProducts(){ const map={};
  state.biz.sales.forEach(s=>{ const k=s.name||"—"; map[k]=map[k]||{name:k,qty:0,rev:0,profit:0};
    map[k].qty+=+s.qty; map[k].rev+=+s.price*+s.qty; map[k].profit+=(+s.price-+(s.cost||0))*+s.qty; });
  return Object.values(map).sort((a,b)=>b.rev-a.rev); }

RENDERERS.negocios=function(){
  const tabs=[["resumo","Resumo"],["stock","Stock"],["vendas","Vendas"],["desp","Despesas"],["div","Dívidas"]];
  const head=`<div class="tabs">${tabs.map(t=>`<button class="tab ${bizTab===t[0]?"active":""}" onclick="setBizTab('${t[0]}')">${t[1]}</button>`).join("")}</div>`;
  return head + ({resumo:bizResumo,stock:bizStock,vendas:bizVendas,desp:bizDesp,div:bizDiv}[bizTab])();
};

    <div class="card">
      <h3 style="font-size:1rem;font-weight:700" class="mb">Demonstração de resultados</h3>
      <div class="stat-line"><span>Receita (vendas)</span><b class="pos">${money(rev)}</b></div>
      <div class="stat-line"><span>(−) Custo dos produtos</span><b class="neg">−${money(cogs)}</b></div>

      <div class="stat-line" style="border-top:2px solid var(--line);margin-top:4px;padding-top:10px"><span class="b">Lucro líquido</span><b class="${profit>=0?"pos":"neg"}" style="font-size:1.1rem">${money(profit)}</b></div>

  </div>`;

/* modais de negócio */
function openProduct(p){ const edit=!!p; p=p||{id:uid(),name:"",stock:0,cost:"",price:"",min:0,unit:"un"};
  openModal(edit?"Editar produto":"Novo produto",`
    <div class="field"><label>Nome do produto</label><input id="pdName" value="${escapeHtml(p.name)}"></div>
    <div class="f-row"><div class="field"><label>Preço de custo</label><input id="pdCost" inputmode="decimal" value="${p.cost}"></div>
      <div class="field"><label>Preço de venda</label><input id="pdPrice" inputmode="decimal" value="${p.price}"></div></div>
    <div class="f-row-3"><div class="field"><label>Stock atual</label><input id="pdStock" inputmode="decimal" value="${p.stock}"></div>
      <div class="field"><label>Stock mínimo</label><input id="pdMin" inputmode="decimal" value="${p.min}"></div>
      <div class="field"><label>Unidade</label><input id="pdUnit" value="${escapeHtml(p.unit||"un")}"></div></div>
  `,{onOk:()=>{ const name=val("pdName"); if(!name){toast("Indique o nome","err");return false;}
    Object.assign(p,{name,cost:valN("pdCost"),price:valN("pdPrice"),stock:valN("pdStock"),min:valN("pdMin"),unit:val("pdUnit")||"un"});
    if(!edit) state.biz.products.push(p); save(); refresh(); toast("Guardado","ok"); }}); }
function delProduct(id){ confirmDel("Eliminar este produto?",()=>{ state.biz.products=state.biz.products.filter(x=>x.id!==id); save(); refresh(); }); }
function openRestock(id){ const p=state.biz.products.find(x=>x.id===id); if(!p) return;
  openModal("Repor stock — "+escapeHtml(p.name),`
    <div class="f-row"><div class="field"><label>Quantidade a adicionar</label><input id="rsQty" inputmode="decimal" value=""></div>
      <div class="field"><label>Custo unitário</label><input id="rsCost" inputmode="decimal" value="${p.cost}"></div></div>
    <label class="flex small" style="cursor:pointer"><input type="checkbox" id="rsExp" checked style="width:auto"> Registar como despesa do negócio</label>
  `,{okText:"Repor stock",onOk:()=>{ const q=valN("rsQty"); if(q<=0) return false; const c=valN("rsCost");
    p.stock=+p.stock+q; if(c) p.cost=c;
    if($("#rsExp").checked) state.biz.expenses.unshift({id:uid(),date:todayISO(),desc:"Reposição de stock: "+p.name,amount:q*c,note:""});
    save(); refresh(); toast("Stock reposto","ok"); }}); }
function openSale(s){ const edit=!!s; const prods=state.biz.products;
  s=s||{id:uid(),date:todayISO(),productId:prods[0]?prods[0].id:"",name:"",qty:1,price:prods[0]?prods[0].price:"",cost:prods[0]?prods[0].cost:0,note:""};
  const opts=prods.map(p=>`<option value="${p.id}" ${p.id===s.productId?"selected":""}>${escapeHtml(p.name)} — ${p.stock} ${escapeHtml(p.unit||"un")}</option>`).join("")+`<option value="" ${s.productId===""?"selected":""}>— Outro / manual —</option>`;
  openModal(edit?"Editar venda":"Nova venda",`
    <div class="field"><label>Produto</label><select id="saProd" onchange="saleFill(false)">${opts}</select></div>
    <div class="field" id="saNameWrap" style="display:none"><label>Nome (manual)</label><input id="saName" value="${escapeHtml(s.name)}"></div>
    <div class="f-row-3"><div class="field"><label>Quantidade</label><input id="saQty" inputmode="decimal" value="${s.qty}" oninput="saleTotal()"></div>
      <div class="field"><label>Preço unit.</label><input id="saPrice" inputmode="decimal" value="${s.price}" oninput="saleTotal()"></div>
      <div class="field"><label>Custo unit.</label><input id="saCost" inputmode="decimal" value="${s.cost}" oninput="saleTotal()"></div></div>
    <div class="field"><label>Data</label><input id="saDate" type="date" value="${s.date}"></div>
    <div class="res" id="saTot">—</div>
  `,{onOk:()=>{ const pid=val("saProd"),qty=valN("saQty"); if(qty<=0){toast("Quantidade inválida","err");return false;}
    const price=valN("saPrice"),cost=valN("saCost"); const prod=prods.find(p=>p.id===pid);
    const name=prod?prod.name:(val("saName")||"Venda avulsa");
    if(edit){ const old=state.biz.sales.find(x=>x.id===s.id); const op=prods.find(p=>p.id===old.productId); if(op) op.stock=+op.stock+ +old.qty; }
    if(prod) prod.stock=+prod.stock-qty;
    Object.assign(s,{date:val("saDate"),productId:pid,name,qty,price,cost,note:""});
    if(!edit) state.biz.sales.unshift(s); save(); refresh(); toast("Venda registada","ok"); }});
  saleFill(true);
}
function saleFill(initial){ const pid=$("#saProd").value; const prod=state.biz.products.find(p=>p.id===pid);
  $("#saNameWrap").style.display=pid?"none":"block";
  if(prod && !initial){ $("#saPrice").value=prod.price; $("#saCost").value=prod.cost; }
  saleTotal(); }
function saleTotal(){ const q=valN("saQty"),p=valN("saPrice"),c=valN("saCost");
  const el=$("#saTot"); if(el) el.innerHTML=`Total: <b>${money(q*p)}</b> &nbsp;·&nbsp; Lucro: <b>${money(q*(p-c))}</b>`; }
function delSale(id){ confirmDel("Eliminar esta venda?",()=>{ const s=state.biz.sales.find(x=>x.id===id);
  const prod=state.biz.products.find(p=>p.id===s.productId); if(prod) prod.stock=+prod.stock+ +s.qty;
  state.biz.sales=state.biz.sales.filter(x=>x.id!==id); save(); refresh(); }); }
function openBizExpense(e){ const edit=!!e; e=e||{id:uid(),date:todayISO(),desc:"",amount:"",note:""};
  openModal(edit?"Editar despesa":"Nova despesa do negócio",`
    <div class="field"><label>Descrição</label><input id="beDesc" value="${escapeHtml(e.desc)}"></div>
    <div class="f-row"><div class="field"><label>Valor</label><input id="beAmt" inputmode="decimal" value="${e.amount}"></div>
      <div class="field"><label>Data</label><input id="beDate" type="date" value="${e.date}"></div></div>
  `,{onOk:()=>{ const desc=val("beDesc"),amount=valN("beAmt"); if(!desc||amount<=0){toast("Preencha os campos","err");return false;}
    Object.assign(e,{desc,amount,date:val("beDate")}); if(!edit) state.biz.expenses.unshift(e); save(); refresh(); toast("Guardado","ok"); }}); }
function delBizExpense(id){ confirmDel("Eliminar despesa?",()=>{ state.biz.expenses=state.biz.expenses.filter(x=>x.id!==id); save(); refresh(); }); }
function openBizDebt(dir,d){ const edit=!!d; d=d||{id:uid(),dir,person:"",amount:"",paid:0,date:todayISO(),due:"",note:""};
  openModal(edit?"Editar":(dir==="client"?"Cliente que me deve":"Fornecedor a quem devo"),`
    <div class="field"><label>${dir==="client"?"Nome do cliente":"Nome do fornecedor"}</label><input id="bdPerson" value="${escapeHtml(d.person)}"></div>
    <div class="f-row"><div class="field"><label>Valor</label><input id="bdAmount" inputmode="decimal" value="${d.amount}"></div>
      <div class="field"><label>Já pago</label><input id="bdPaid" inputmode="decimal" value="${d.paid||0}"></div></div>
    <div class="f-row"><div class="field"><label>Data</label><input id="bdDate" type="date" value="${d.date}"></div>
      <div class="field"><label>Vencimento</label><input id="bdDue" type="date" value="${d.due||""}"></div></div>
    <div class="field"><label>Nota</label><input id="bdNote" value="${escapeHtml(d.note)}"></div>
  `,{onOk:()=>{ const person=val("bdPerson"),amount=valN("bdAmount"); if(!person||amount<=0){toast("Preencha os campos","err");return false;}
    Object.assign(d,{person,amount,paid:Math.min(valN("bdPaid"),amount),date:val("bdDate"),due:val("bdDue"),note:val("bdNote")});
    if(!edit) state.biz.debts.push(d); save(); refresh(); toast("Guardado","ok"); }}); }
function payBizDebt(id){ const d=state.biz.debts.find(x=>x.id===id); if(!d) return; const rest=d.amount-(d.paid||0);
  openModal("Registar pagamento",`<div class="field"><label>Valor</label><input id="bpAmt" inputmode="decimal" value="${rest}"></div>`,
    {okText:"Registar",onOk:()=>{ const p=valN("bpAmt"); if(p<=0) return false; d.paid=Math.min((d.paid||0)+p,d.amount); save(); refresh(); toast("Registado","ok"); }}); }
function delBizDebt(id){ confirmDel("Eliminar?",()=>{ state.biz.debts=state.biz.debts.filter(x=>x.id!==id); save(); refresh(); }); }

const PRI={alta:{c:"red",l:"Alta"},media:{c:"amber",l:"Média"},baixa:{c:"blue",l:"Baixa"}};
RENDERERS.necessidades=function(){
  const open=state.needs.filter(n=>n.status!=="done");
  const done=state.needs.filter(n=>n.status==="done");
  const totalNeed=open.reduce((s,n)=>s+ +n.amount,0);
  const totalSaved=open.reduce((s,n)=>s+ +(n.saved||0),0);
  const order={alta:0,media:1,baixa:2};
  open.sort((a,b)=>order[a.priority]-order[b.priority]);
  const card=n=>{ const amt=+n.amount, sv=+(n.saved||0), rest=Math.max(0,amt-sv), pc=amt>0?clamp(sv/amt*100,0,100):0;
    return `<div class="card" style="padding:16px;margin-bottom:12px">
      <div class="row-between"><div class="flex"><span class="badge ${PRI[n.priority].c}">${PRI[n.priority].l}</span><span class="b">${escapeHtml(n.name)}</span></div>
        <span class="num">${money(amt)}</span></div>
      <div class="small muted" style="margin:6px 0">💰 De: ${escapeHtml(n.source||"—")}${n.note?" · "+escapeHtml(n.note):""}</div>
      ${progress(sv,amt)}
      <div class="row-between" style="margin-top:8px">
        <span class="small muted">Juntei ${money(sv)} · faltam <b>${money(rest)}</b> (${Math.round(pc)}%)</span>
        <div class="flex">
          <button class="btn btn-sm btn-primary" onclick="needSave('${n.id}')">+ Juntar</button>
          <button class="btn btn-sm" onclick="needBought('${n.id}')">✓ Comprado</button>
          <button class="btn btn-ghost btn-sm" onclick="openNeed(state.needs.find(x=>x.id==='${n.id}'))">✎</button>
          <button class="btn btn-ghost btn-sm" onclick="delNeed('${n.id}')">🗑</button>

let graphPeriod=6;

function balanceTrend(n){ const now=new Date(); const months=[];
  for(let i=n-1;i>=0;i--){ months.push(new Date(now.getFullYear(),now.getMonth()-i,1).toISOString().slice(0,7)); }
  let running=state.movements.filter(m=>m.date.slice(0,7)<months[0]).reduce((s,m)=>s+(m.type==="in"?+m.amount:-+m.amount),0);
  return months.map(key=>{ const net=state.movements.filter(m=>m.date.slice(0,7)===key).reduce((s,m)=>s+(m.type==="in"?+m.amount:-+m.amount),0);
    running+=net; return {label:new Date(key+"-01").toLocaleDateString("pt-PT",{month:"short"}),v:running}; }); }

/* =========================================================
   CALCULADORA & FERRAMENTAS
   ========================================================= */
const CALC={cur:"0",prev:null,op:null,fresh:true};
function calcRender(){ const c=$("#calcCur"); if(c) c.textContent=CALC.cur; const p=$("#calcPrev"); if(p) p.textContent=CALC.prev!=null?(CALC.prev+" "+(CALC.op||"")):""; }
function calcInput(d){ if(CALC.fresh){ CALC.cur=(d==="."?"0.":d); CALC.fresh=false; } else { if(d==="."&&CALC.cur.includes("."))return; CALC.cur=(CALC.cur==="0"&&d!==".")?d:CALC.cur+d; } calcRender(); }
function calcOp(op){ if(CALC.op!=null&&!CALC.fresh) calcEq(); CALC.prev=parseFloat(CALC.cur); CALC.op=op; CALC.fresh=true; calcRender(); }
function calcEq(){ if(CALC.op==null||CALC.prev==null) return; const a=CALC.prev,b=parseFloat(CALC.cur); let r=0;
  if(CALC.op==="+")r=a+b; else if(CALC.op==="−")r=a-b; else if(CALC.op==="×")r=a*b; else if(CALC.op==="÷")r=b!==0?a/b:0;
  CALC.cur=String(Math.round(r*1e8)/1e8); CALC.op=null; CALC.prev=null; CALC.fresh=true; calcRender(); }
function calcClear(){ CALC.cur="0";CALC.prev=null;CALC.op=null;CALC.fresh=true; calcRender(); }
function calcDel(){ if(CALC.fresh){CALC.cur="0";} else CALC.cur=CALC.cur.length>1?CALC.cur.slice(0,-1):"0"; calcRender(); }
function calcPct(){ CALC.cur=String(parseFloat(CALC.cur)/100); calcRender(); }
function calcSign(){ CALC.cur=String(parseFloat(CALC.cur)*-1); calcRender(); }

   ========================================================= */
const CURRENCIES={
  MZN:{code:"MZN",symbol:"MT",pos:"after",dec:2,ts:".",ds:",",name:"Metical (Moçambique)"},
  AOA:{code:"AOA",symbol:"Kz",pos:"after",dec:2,ts:".",ds:",",name:"Kwanza (Angola)"},
  USD:{code:"USD",symbol:"$",pos:"before",dec:2,ts:",",ds:".",name:"Dólar (EUA)"},
  EUR:{code:"EUR",symbol:"€",pos:"after",dec:2,ts:".",ds:",",name:"Euro"},
  ZAR:{code:"ZAR",symbol:"R",pos:"before",dec:2,ts:" ",ds:".",name:"Rand (Áfr. do Sul)"},
  BRL:{code:"BRL",symbol:"R$",pos:"before",dec:2,ts:".",ds:",",name:"Real (Brasil)"},
  GBP:{code:"GBP",symbol:"£",pos:"before",dec:2,ts:",",ds:".",name:"Libra"},
  CVE:{code:"CVE",symbol:"$",pos:"after",dec:2,ts:".",ds:",",name:"Escudo (Cabo Verde)"}
};
RENDERERS.definicoes=function(){
  const c=state.settings.curr;
  return `
  <div class="grid cols-2">
    <div class="card">
      <div class="card-h"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg></div><h3>Geral</h3></div>
      <div class="field"><label>Nome do app</label><input id="stName" value="${escapeHtml(state.settings.appName)}"></div>
      <div class="field"><label>Tema</label>
        <div class="pill-toggle" style="display:flex"><button class="${state.settings.theme==="light"?"active":""}" onclick="setTheme('light')" style="flex:1">☀ Claro</button><button class="${state.settings.theme==="dark"?"active":""}" onclick="setTheme('dark')" style="flex:1">🌙 Escuro</button></div></div>
      <button class="btn btn-primary btn-block" onclick="saveGeneral()">Guardar nome</button>
    </div>
    <div class="card">
      <div class="card-h"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M9 9.5a2.5 2 0 0 1 5 0M9 14.5a2.5 2 0 0 0 5 0"/></svg></div><h3>Moeda</h3></div>
      <div class="field"><label>Escolher moeda</label><select id="curPreset" onchange="applyPreset()">
        ${Object.entries(CURRENCIES).map(([k,v])=>`<option value="${k}" ${v.code===c.code?"selected":""}>${v.name} — ${v.symbol}</option>`).join("")}
        <option value="custom">Personalizada…</option></select></div>
      <div class="f-row"><div class="field"><label>Símbolo</label><input id="curSym" value="${c.symbol}"></div>
        <div class="field"><label>Código</label><input id="curCode" value="${c.code}"></div></div>
      <div class="f-row-3"><div class="field"><label>Posição</label><select id="curPos"><option value="after" ${c.pos==="after"?"selected":""}>Depois (100 MT)</option><option value="before" ${c.pos==="before"?"selected":""}>Antes ($100)</option></select></div>
        <div class="field"><label>Decimais</label><select id="curDec"><option ${c.dec===0?"selected":""}>0</option><option ${c.dec===2?"selected":""}>2</option></select></div>
        <div class="field"><label>Exemplo</label><input value="${money(1234.5)}" disabled></div></div>
      <button class="btn btn-primary btn-block" onclick="saveCurrency()">Aplicar moeda</button>
    </div>
  </div>

  <div class="grid cols-2 mt">
    <div class="card">
      <h3 style="font-size:1rem;font-weight:700" class="mb">Contas / Carteiras</h3>
      ${state.accounts.map(a=>`<div class="list-row"><span style="flex:1">${escapeHtml(a)}</span><button class="btn btn-ghost btn-sm" onclick="delAccount('${escapeHtml(a)}')">🗑</button></div>`).join("")}
      <button class="btn btn-block mt" onclick="addAccount()">+ Nova conta</button>
    </div>
    <div class="card">
      <h3 style="font-size:1rem;font-weight:700" class="mb">Categorias de despesa</h3>
      <div class="chips mb">${state.categories.out.map(c=>`<span class="chip" onclick="delCategory('out','${escapeHtml(c)}')">${escapeHtml(c)} ✕</span>`).join("")}</div>
      <button class="btn btn-block" onclick="addCategory('out')">+ Categoria de despesa</button>
      <div class="divider"></div>
      <h3 style="font-size:1rem;font-weight:700" class="mb">Categorias de entrada</h3>
      <div class="chips mb">${state.categories.in.map(c=>`<span class="chip" onclick="delCategory('in','${escapeHtml(c)}')">${escapeHtml(c)} ✕</span>`).join("")}</div>
      <button class="btn btn-block" onclick="addCategory('in')">+ Categoria de entrada</button>
    </div>
  </div>

  <div class="card mt">
    <div class="card-h"><div class="ico" style="background:#6366f122;color:#6366f1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></div><h3>Cópia de segurança (backup)</h3></div>
    <p class="muted small mb">Os seus dados estão apenas neste dispositivo. Exporte um ficheiro de backup para guardar em segurança ou para passar os dados para outro telemóvel/computador.</p>
    <div class="flex wrap">
      <button class="btn btn-primary" onclick="exportData()"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Exportar backup</button>
      <button class="btn" onclick="openImport()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Importar backup</button>
      <button class="btn" onclick="openBackupText()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg>Copiar texto</button>
      <button class="btn" onclick="exportCSV()">Exportar movimentos (CSV)</button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-danger" onclick="resetData()">Apagar todos os dados</button>
  </div>

  <div class="card mt" style="text-align:center">
    <p class="muted small">Cofre · App de gestão financeira · Funciona offline · Versão 1.0</p>
    <p class="muted small">Criado para uso pessoal e de negócios. Os dados nunca saem do seu dispositivo.</p>
  </div>`;
};
function setTheme(t){ state.settings.theme=t; save(); applyTheme(); refresh(); }
function saveGeneral(){ state.settings.appName=val("stName")||"Cofre"; save(); $("#brandName").textContent=state.settings.appName; toast("Guardado","ok"); }
function applyPreset(){ const k=$("#curPreset").value; if(k==="custom") return; const c=CURRENCIES[k];
  $("#curSym").value=c.symbol; $("#curCode").value=c.code; $("#curPos").value=c.pos; $("#curDec").value=c.dec; }
function saveCurrency(){ state.settings.curr={ code:val("curCode")||"MZN", symbol:val("curSym")||"MT", pos:val("curPos"), dec:parseInt(val("curDec"))||0, ts:state.settings.curr.ts, ds:state.settings.curr.ds };
  // adopt separators from preset if matched
  const match=Object.values(CURRENCIES).find(c=>c.code===state.settings.curr.code); if(match){ state.settings.curr.ts=match.ts; state.settings.curr.ds=match.ds; }
  save(); refresh(); toast("Moeda atualizada","ok"); }
function addAccount(){ openModal("Nova conta / carteira",`<div class="field"><label>Nome</label><input id="acN" placeholder="Ex.: Banco, M-Pesa, Cofre"></div>`,
  {onOk:()=>{ const n=val("acN"); if(!n) return false; if(!state.accounts.includes(n)) state.accounts.push(n); save(); refresh(); toast("Adicionada","ok"); }}); }
function delAccount(name){ if(state.accounts.length<=1){ toast("Tem de existir pelo menos uma conta","err"); return; }
  state.accounts=state.accounts.filter(a=>a!==name); save(); refresh(); }
function addCategory(kind){ openModal("Nova categoria",`<div class="field"><label>Nome da categoria</label><input id="ctN"></div>`,
  {onOk:()=>{ const n=val("ctN"); if(!n) return false; if(!state.categories[kind].includes(n)) state.categories[kind].push(n); save(); refresh(); }}); }
function delCategory(kind,name){ state.categories[kind]=state.categories[kind].filter(c=>c!==name); save(); refresh(); }
function exportData(){
  const json=JSON.stringify(state,null,2), fname="cofre-backup-"+todayISO()+".json";
  if(window.AndroidCofre && window.AndroidCofre.saveBackup){
    try{ window.AndroidCofre.saveBackup(fname,json); toast("Escolha onde guardar o backup","ok"); return; }catch(e){}
  }
  try{ const blob=new Blob([json],{type:"application/json"}); const a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download=fname; document.body.appendChild(a); a.click(); a.remove();
    toast("Backup guardado em Transferências/Downloads","ok");
  }catch(e){ openBackupText(); }
}
function openBackupText(){
  const json=JSON.stringify(state,null,2);
  openModal("Texto do backup",
    "<p class='small muted mb'>Copie este texto e guarde-o num sítio seguro (envie para si no WhatsApp, nas Notas ou por e-mail). Para repor, use \"Importar backup\" e cole-o.</p>"+
    "<div class='field'><textarea id='bkText' rows='8' readonly></textarea></div>"+
    "<button class='btn btn-primary btn-block' onclick='copyBackup()'>Copiar texto</button>",
    {hideFooter:true});
  const t=$("#bkText"); if(t){ t.value=json; setTimeout(function(){ t.focus(); t.select(); },60); }
}
function copyBackup(){ const t=$("#bkText"); if(!t) return; t.focus(); t.select(); try{ t.setSelectionRange(0,999999); }catch(e){}
  const done=function(){ toast("Copiado para a área de transferência","ok"); };
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(t.value).then(done).catch(function(){ try{ document.execCommand("copy"); done(); }catch(e){ toast("Selecione e copie manualmente","err"); } }); }
  else { try{ document.execCommand("copy"); done(); }catch(e){ toast("Selecione e copie manualmente","err"); } }
}
function openImport(){
  openModal("Importar backup",
    "<p class='small muted mb'>Escolha o ficheiro .json do backup, ou cole o texto do backup em baixo.</p>"+
    "<div class='field'><label>Opção 1 — Ficheiro de backup</label><input type='file' id='impFile2' accept='application/json,.json,text/plain' onchange='importFromFile(this)'></div>"+
    "<div class='divider'></div>"+
    "<div class='field'><label>Opção 2 — Colar o texto do backup</label><textarea id='impText' rows='6' placeholder='Cole aqui o texto do backup...'></textarea></div>",
    {okText:"Importar texto", onOk:function(){ const t=val("impText"); if(!t){ toast("Cole o texto ou escolha um ficheiro","err"); return false; } return importFromString(t); }});
}
function importFromFile(input){ const f=input.files[0]; if(!f) return; const r=new FileReader();
  r.onload=function(e){ if(importFromString(e.target.result)) closeModal(); }; r.readAsText(f); }
function importFromString(text){
  try{ const data=JSON.parse(text); if(!data.settings||!Array.isArray(data.movements)) throw 0;
    state=Object.assign(defaultState(),data); save(); applyTheme(); $("#brandName").textContent=state.settings.appName||"Cofre"; buildNav(); navigate("painel"); toast("Backup restaurado com sucesso","ok"); return true;
  }catch(e){ toast("Backup inválido — verifique o texto/ficheiro","err"); return false; }
}
function exportCSV(){ const rows=[["Data","Tipo","Categoria","Conta","Nota","Valor"]];
  state.movements.forEach(m=> rows.push([m.date, m.type==="in"?"Entrada":"Saída", m.category||"", m.account||"", (m.note||"").replace(/[\n;,]/g," "), m.amount]));
  const csv=rows.map(r=>r.join(";")).join("\n"); const blob=new Blob(["﻿"+csv],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="cofre-movimentos-"+todayISO()+".csv"; a.click();
  toast("CSV exportado","ok"); }
function resetData(){ confirmDel("APAGAR TODOS os dados? Esta ação é irreversível. Faça primeiro um backup!",()=>{ state=defaultState(); save(); applyTheme(); $("#brandName").textContent="Cofre"; buildNav(); navigate("painel"); toast("Dados apagados"); }); }

/* ---------- Arranque ---------- */
function boot(){
  applyTheme();
  $("#brandName").textContent = state.settings.appName||"Cofre";
  buildNav();
  navigate("painel");
}
boot();

/* ---------- PWA: instalação e offline ---------- */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",(e)=>{ e.preventDefault(); deferredPrompt=e; const b=document.getElementById("installBtn"); if(b) b.classList.remove("hidden"); });
window.addEventListener("appinstalled",()=>{ const b=document.getElementById("installBtn"); if(b) b.classList.add("hidden"); toast("App instalada com sucesso","ok"); });
function installApp(){
  if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt.userChoice.finally(()=>{ deferredPrompt=null; const b=document.getElementById("installBtn"); if(b) b.classList.add("hidden"); }); }
  else { openModal("Instalar a Cofre", "<p class='mb'>Para instalar no ecrã inicial:</p><p class='small muted mb'><b>Android (Chrome):</b> abra o menu e toque em <b>Adicionar ao ecrã principal</b>.</p><p class='small muted mb'><b>iPhone (Safari):</b> toque em Partilhar e em <b>Adicionar ao ecrã principal</b>.</p><p class='small muted'><b>Computador (Chrome/Edge):</b> clique no ícone de instalar na barra de endereço.</p>", {hideFooter:true}); }
}
if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("./service-worker.js").catch(()=>{}); });
}
</script>
</body>
</html>
